    <script>
        // Auto-scroll through 5 anime images every 3 seconds
        const images = [
            "C:/Users/palak anand/OneDrive/Desktop/renders/Picsart_23-08-27_15-30-43-489.png",
            "C:/Users/palak anand/OneDrive/Desktop/renders/Picsart_23-08-27_15-38-22-685.png",

            "C:/Users/palak anand/OneDrive/Desktop/renders/Picsart_23-08-27_16-02-54-280.png"
        ];
        let index = 0;
        function changeImage() {
            index = (index + 1) % images.length;
            document.getElementById("anime-image").src = images[index];
        }
        setInterval(changeImage, 3000); // Change image every 3 seconds
    </script>
